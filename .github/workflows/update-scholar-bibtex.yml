name: Update Scholar BibTeX

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-bibtex:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install scholarly

      - name: Prepare output directory
        run: |
          mkdir -p data/bib

      - name: Load scholar IDs from JSON and generate .bib files
        id: generate
        run: |
          echo "Reading data/googlescholar.json"
          cat data/googlescholar.json
          echo

          # Read JSON → loop over keys and values using jq
          for row in $(jq -r 'to_entries[] | @base64' data/googlescholar.json); do
            _jq() { echo "${row}" | base64 --decode | jq -r "${1}"; }

            key=$(_jq '.key')
            id=$(_jq '.value')

            echo "=== Processing: key=$key  id=$id ==="

            python scripts/export_scholar_bibtex.py \
              --scholar-id "$id" \
              --out "data/bib/${key}.bib"

            echo
          done

      - name: Check for changes
        id: check_changes
        run: |
          if git status --porcelain | grep -q .; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute branch name
        if: steps.check_changes.outputs.changed == 'true'
        id: branch_name
        run: |
          BRANCH="scholar-bib-update-${GITHUB_RUN_ID}"
          echo "name=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Configure git user
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"

      - name: Create branch, commit, and push
        if: steps.check_changes.outputs.changed == 'true'
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          BRANCH_NAME: ${{ steps.branch_name.outputs.name }}
        run: |
          git checkout -b "$BRANCH_NAME" "origin/$DEFAULT_BRANCH"
          git add data/bib
          git commit -m "Update Scholar BibTeX files"
          git push origin "$BRANCH_NAME"

      - name: Open pull request
        if: steps.check_changes.outputs.changed == 'true'
        uses: actions/github-script@v7
        env:
          BRANCH_NAME: ${{ steps.branch_name.outputs.name }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const defaultBranch = context.payload.repository.default_branch;
            const branchName = process.env.BRANCH_NAME;

            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "Update Scholar BibTeX files",
              head: branchName,
              base: defaultBranch,
              body: [
                "Automatically updated BibTeX files from Google Scholar IDs in `data/googlescholar.json`.",
                "",
                "- Generated under `data/bib/*.bib`",
                "- Produced by the export script",
              ].join("\n")
            });

            core.info(`Created PR #${pr.number}: ${pr.html_url}`);

      - name: No changes – skip PR
        if: steps.check_changes.outputs.changed != 'true'
        run: |
          echo "No changes detected. Nothing to commit or PR."
